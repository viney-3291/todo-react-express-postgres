name: CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 865749917919.dkr.ecr.us-east-1.amazonaws.com
  BACKEND_IMAGE: todo-backend
  FRONTEND_IMAGE: todo-frontend
  EKS_CLUSTER: todo-cluster

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and push backend image
        run: |
          docker build --platform linux/amd64 -t $ECR_REGISTRY/$BACKEND_IMAGE:latest ./backend
          docker push $ECR_REGISTRY/$BACKEND_IMAGE:latest

      - name: Build and push frontend image
        run: |
          docker build --platform linux/amd64 -t $ECR_REGISTRY/$FRONTEND_IMAGE:latest ./frontend
          docker push $ECR_REGISTRY/$FRONTEND_IMAGE:latest

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER

      - name: Deploy to EKS
        run: |
          kubectl rollout restart deployment/todo-backend
          kubectl rollout restart deployment/todo-frontend
          kubectl rollout status deployment/todo-backend
          kubectl rollout status deployment/todo-frontend